[bootstrap.packages]
"brew:ghostscript" = "latest"
"brew:imagemagick" = "latest"
"brew:ranger"      = "latest"
"brew:witr"        = "latest"
"brew:viu"         = "latest"

[tools]
# Languages / runtimes
bun    = "1.3.14"
deno   = "2.9.3"
go     = "1.26.5"
lua    = "5.5.0"
node   = "26.5.0"
python = "3.14.6"
ruby   = "4.0.6"
rust   = "1.97.1"

# JavaScript package managers
pnpm = "11.16.0"

# Diagram rendering
"npm:@mermaid-js/mermaid-cli" = "11.16.0"

# AI agents
"npm:@anthropic-ai/claude-code"       = { version = "2.1.218", npm_args = "--ignore-scripts=false" }
"npm:@earendil-works/pi-coding-agent" = "0.82.0"
"npm:@openai/codex"                   = "0.145.0"
"npm:happy"                           = { version = "1.2.0", npm_args = "--ignore-scripts=false" }
"npm:opencode-ai"                     = { version = "1.18.4", npm_args = "--ignore-scripts=false" }
"npm:tmux-team"                       = "4.2.0"

# Python tooling
"pipx:httpie" = "3.2.4"
uv            = "0.11.31"

# Infrastructure as code
opentofu       = "1.12.5"
terraform      = "1.15.8"
terraform-docs = "0.24.0"
terragrunt     = "1.1.1"
tflint         = "0.64.0"
tfsec          = "1.28.14"

# Cloud / Kubernetes
aws-cli     = { version = "2.36.7", symlink_bins = "true" }
cloudflared = "2026.7.3"
gcloud      = "577.0.0"
helm        = "4.2.3"
k9s         = "0.51.0"
kubectl     = "1.36.3"
kubecolor   = "0.6.0"
kubectx     = "0.11.0"
minikube    = "1.38.1"

# Git / shell / developer workflow
atuin                     = "18.17.1"
delta                     = "0.19.2"
direnv                    = "2.37.1"
fzf                       = "0.74.1"
gh                        = "2.96.0"
"github:joshmedeski/sesh" = "2.27.0"
just                      = "1.57.0"
lazydocker                = "0.25.2"
lazygit                   = "0.63.1"
prek                      = "0.4.10"
shellcheck                = "0.11.0"
shfmt                     = "3.13.1"
tmux                      = "3.7b"
zoxide                    = "0.10.0"

# Editors / code tooling
neovim      = "0.12.4"
stylua      = "2.5.2"
taplo       = "0.10.0"
tree-sitter = "0.26.11"
yamlfmt     = "0.21.0"

# CLI utilities
bat                                  = "0.26.1"
cmake                                = "4.3.4"
"cargo:eza"                          = "0.23.5"
fd                                   = "10.4.2"
ffmpeg                               = "8.1.2"
glow                                 = "2.1.2"
"go:github.com/jorgerojas26/lazysql" = "v0.5.5"
jd                                   = "2.5.0"
jq                                   = "1.8.2"
ripgrep                              = "15.2.0"
sqlite                               = "3.53.3"
yazi                                 = "26.5.6"
yq                                   = "4.53.3"
herdr                                = "latest"

[settings]
experimental = true
env_file = ".env.local"
idiomatic_version_file_enable_tools = ["ruby", "node", "python", "go"]
http_timeout = "30s"
minimum_release_age = "1d"
minimum_release_age_excludes = [
  "npm:@anthropic-ai/claude-code",
  "npm:@earendil-works/pi-coding-agent",
  "npm:opencode-ai",
  "npm:@openai/codex",
]

[settings.ruby]
compile = false

[settings.dotfiles]
default_mode = "symlink"
root         = "~/.dotfiles"

[dotfiles]
"~/.config/alacritty"                                        = "~/.dotfiles/config/alacritty"
"~/.config/atuin"                                            = "~/.dotfiles/config/atuin"
"~/.config/ghostty"                                          = "~/.dotfiles/config/ghostty"
"~/.config/kesh"                                             = "~/.dotfiles/config/kesh"
"~/.config/kitty"                                            = "~/.dotfiles/config/kitty"
"~/.config/lazygit"                                          = "~/.dotfiles/config/lazygit"
"~/.config/mise/config.toml"                                 = "~/.dotfiles/config/mise/config.toml"
"~/.config/nvim"                                             = "~/.dotfiles/config/nvim"
"~/.config/opencode"                                         = "~/.dotfiles/config/opencode"
"~/.config/yazi"                                             = "~/.dotfiles/config/yazi"
"~/.config/zsh"                                              = "~/.dotfiles/config/zsh"
"~/.hammerspoon"                                             = "~/.dotfiles/macos/hammerspoon"
"~/.hushlogin"                                               = "~/.dotfiles/home/.hushlogin"
"~/.irbrc"                                                   = "~/.dotfiles/home/.irbrc"
"~/.local/bin/sesh-list"                                     = "~/.dotfiles/local/bin/sesh-list"
"~/.local/bin/tmux-sesh"                                     = "~/.dotfiles/local/bin/tmux-sesh"
"~/.p10k.mise.zsh"                                           = "~/.dotfiles/home/.p10k.mise.zsh"
"~/.p10k.zsh"                                                = "~/.dotfiles/home/.p10k.zsh"
"~/.pryrc"                                                   = "~/.dotfiles/home/.pryrc"
"~/.solargraph.yml"                                          = "~/.dotfiles/home/.solargraph.yml"
"~/.tmux.conf"                                               = "~/.dotfiles/home/.tmux.conf"
"~/.zsh_plugins.txt"                                         = "~/.dotfiles/home/.zsh_plugins.txt"
"~/.zshrc"                                                   = "~/.dotfiles/home/.zshrc"
"~/Library/Application Support/com.mitchellh.ghostty/config" = "~/.dotfiles/config/ghostty/config"

[tasks.setup]
description = "Apply dotfiles"
run         = "mise dotfiles apply --force --yes"

[tasks.test]
description = "Validate dotfiles"
run = [
  "mise dotfiles status >/dev/null",
  "mise ls --current >/dev/null",
  "zsh -n ~/.dotfiles/home/.zshrc ~/.dotfiles/config/zsh/*.zsh",
  "python - <<'PY'\nimport tomllib\nfrom pathlib import Path\ntomllib.loads((Path.home() / '.dotfiles/config/mise/config.toml').read_text())\nPY",
  "XDG_CONFIG_HOME=~/.dotfiles/config nvim --headless -c 'lua local ok, err = pcall(function() require(\"user.plugins.octo\") end); if not ok then error(err) end' -c 'qa!'",
  "tmux new-session -d -s nvim-mise-test 'cd ~/.dotfiles && XDG_CONFIG_HOME=~/.dotfiles/config nvim test.ts' && sleep 3 && tmux capture-pane -t nvim-mise-test -p >/dev/null && tmux send-keys -t nvim-mise-test ':qa!' Enter && sleep 1 && tmux kill-session -t nvim-mise-test 2>/dev/null || true",
]

[tasks.kesh]
description = "Rebuild Kitty Kesh"
run         = "cd \"$HOME/.config/kitty/scripts/kesh\" && go build -o kesh ."

[tasks.bump-all]
description = "Update development environment"
run = [
  "brew update",
  "brew upgrade -y",
  "mise self-update -y",
  "mise install",
  "mise upgrade --bump --yes",
  "mise prune",
  "mise reshim",
]

[tasks.bump-daily]
description = "Update AI tools"
run = [
  "mise upgrade --bump --yes npm:@earendil-works/pi-coding-agent npm:@openai/codex npm:@anthropic-ai/claude-code npm:opencode-ai",
  "pi update --extensions",
]


[tasks.tmux]
description = "Install tmux and tmux plugins"
depends = ["setup"]
run = '''
set -eu

mise install tmux
mise reshim tmux

clone_or_update() {
  repo="$1"
  dest="$2"
  if [ -d "$dest/.git" ]; then
    git -C "$dest" pull --ff-only
  else
    git clone --depth 1 "$repo" "$dest"
  fi
}

mkdir -p "$HOME/.tmux/plugins" "$HOME/.config/tmux/plugins/catppuccin"
clone_or_update https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm"
clone_or_update https://github.com/christoomey/vim-tmux-navigator "$HOME/.tmux/plugins/vim-tmux-navigator"
clone_or_update https://github.com/jimeh/tmuxifier "$HOME/.tmux/plugins/tmuxifier"
clone_or_update https://github.com/sainnhe/tmux-fzf "$HOME/.tmux/plugins/tmux-fzf"
clone_or_update https://github.com/catppuccin/tmux "$HOME/.config/tmux/plugins/catppuccin/tmux"

tmux -V
tmux -L mise-setup new-session -d -s mise-tmux-test
tmux -L mise-setup source-file "$HOME/.tmux.conf"
tmux -L mise-setup kill-server 2>/dev/null || true
'''

[tasks.zsh]
description = "Install zsh and set it as the default login shell"
depends = ["setup"]
run = '''
set -e
if ! command -v zsh >/dev/null 2>&1; then
  echo "Installing zsh via apt..."
  sudo apt update && sudo apt install -y zsh
fi
ZSH_PATH="$(command -v zsh)"
if ! grep -qx "$ZSH_PATH" /etc/shells; then
  echo "$ZSH_PATH" | sudo tee -a /etc/shells >/dev/null
fi
if [ "${SHELL:-}" != "$ZSH_PATH" ]; then
  echo "Setting default login shell to $ZSH_PATH..."
  sudo chsh -s "$ZSH_PATH" "$USER"
fi
echo "zsh ready: $ZSH_PATH (re-login to use it)"
'''
