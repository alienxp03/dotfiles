# ─────────────────────────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────────────────────────
font_size 13
shell_integration no-title
shell /bin/zsh
editor nvim
startup_session ~/.config/kitty/startup-session.conf
scrollback_lines 10000
wheel_scroll_multiplier 3.0
copy_on_select yes
notify_on_cmd_finish never
allow_remote_control yes
mouse_hide_wait	-3.0
listen_on unix:/tmp/kitty

# Window appearance
hide_window_decorations titlebar-only
window_padding_width 1 5 2 2
background_opacity 0.88
background_blur 0
remember_window_size yes
remember_window_position yes

# Tabs and layouts
enabled_layouts splits:split_axis=horizontal,stack
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_filter session:~
# tab_title_template "{tab.active_wd.rsplit('/', 1)[-1]}"

# ─────────────────────────────────────────────────────────────────────────────
# Keyboard
# ─────────────────────────────────────────────────────────────────────────────
kitty_mod cmd+shift
macos_option_as_alt both
# Make Option+Backspace behave like Ctrl+W (delete previous word).
map alt+backspace send_text all \x17

# Config and pane layout
map cmd+r load_config_file
map cmd+shift+f toggle_layout stack
map cmd+enter toggle_layout stack
map cmd+shift+r start_resizing_window
map cmd+d combine : goto_layout splits : launch --cwd=current --location=vsplit
map cmd+shift+d combine : goto_layout splits : launch --cwd=current --location=hsplit
map cmd+t new_tab_with_cwd
map cmd+shift+n set_tab_title
map cmd+p goto_session -1
map cmd+k clear_terminal to_cursor active

# Session, project, and coding-agent pickers
map cmd+shift+o launch --type=overlay ~/.config/kitty/scripts/kitty-zoxide-session.sh
map cmd+shift+p launch --type=overlay ~/.config/kitty/scripts/kitty-agent-picker.sh

# Tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+shift+backslash toggle_tab title:.*

# Window navigation
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Let Neovim handle split navigation and cross back into Kitty at an edge.
map --when-focus-on var:in_editor ctrl+h
map --when-focus-on var:in_editor ctrl+j
map --when-focus-on var:in_editor ctrl+k
map --when-focus-on var:in_editor ctrl+l

# Let fzf handle Ctrl+J/K inside the project pickers.
map --when-focus-on title:project-picker ctrl+j
map --when-focus-on title:project-picker ctrl+k

# Window resizing
map cmd+shift+h resize_window wider
map cmd+shift+j resize_window taller
map cmd+shift+k resize_window shorter
map cmd+shift+l resize_window narrower

# Cursor trail
cursor_trail 1
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 0

# Scrollback in Neovim
scrollback_pager nvim -u ~/.config/nvim/scrollback.lua +'call nvim_open_term(0, {})' +'set readonly wrap' +'normal! G | if getline(".") ==# "" | normal! k | endif' -
map kitty_mod+up scroll_line_up
map kitty_mod+down scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end
map kitty_mod+z show_scrollback
map cmd+shift+x launch --type=overlay --stdin-source=@screen --stdin-add-formatting nvim -u ~/.config/nvim/scrollback.lua +'call nvim_open_term(0, {})' +'set readonly wrap' +'normal! G | if getline(".") ==# "" | normal! k | endif' -


# Theme: Gruvbox Material Dark Hard
include current-theme.conf


# BEGIN_KITTY_FONTS
font_family      family="CommitMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
