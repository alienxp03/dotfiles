[tools]
# Languages / runtimes
bun = "1"
deno = "2"
go = "1.26"
node = "26"
python = "3.14"
ruby = "4.0"
rust = "1"

# JavaScript package managers
pnpm = "11"

# AI agents
codex = "latest"
opencode = "latest"
pi = "latest"

# Python tooling
"pipx:httpie" = "3"
pre-commit = "4"
uv = "0.11"

# Infrastructure as code
opentofu = "1.12"
terraform = "1.15"
terraform-docs = "0.24"
terragrunt = "1.0"
tflint = "0.63"
tfsec = "1.28"

# Cloud / Kubernetes
aws-cli = "2"
cloudflared = "2026"
helm = "4"
k9s = "0.51"
kubectl = "1.36"
kubectx = "0.11"

# Git / shell / developer workflow
atuin = "latest"
delta = "0.19"
direnv = "2"
fzf = "0.73"
gh = "2"
just = "1"
lazydocker = "0.25"
lazygit = "0.62"
shellcheck = "0.11"
tmux = "3"
zoxide = "0.9"

# Editors / code tooling
neovim = "0.12"
tree-sitter = "0.26"
yamlfmt = "0.21"

# CLI utilities
bat = "0.26"
"cargo:csvlens" = "0.15"
cmake = "4"
eza = "0.23"
fd = "10"
ffmpeg = "8"
jd = "2"
jq = "1"
ripgrep = "15"
yazi = "26"
yq = "4"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby", "node", "python"]
http_timeout = "5s"

[settings.ruby]
compile = true

[settings.dotfiles]
default_mode = "symlink"
root = "~/.dotfiles"

[dotfiles]
"~/.claude/CLAUDE.md" = "~/.dotfiles/claude/.claude/CLAUDE.md"
"~/.config/alacritty" = "~/.dotfiles/dotfiles/config/alacritty"
"~/.config/atuin" = "~/.dotfiles/dotfiles/config/atuin"
"~/.config/ghostty" = "~/.dotfiles/dotfiles/config/ghostty"
"~/.config/just" = "~/.dotfiles/dotfiles/config/just"
"~/.config/karabiner" = "~/.dotfiles/dotfiles/config/karabiner"
"~/.config/lazygit" = "~/.dotfiles/dotfiles/config/lazygit"
"~/.config/mise/config.toml" = "~/.dotfiles/dotfiles/config/mise/config.toml"
"~/.config/nvim" = "~/.dotfiles/dotfiles/config/nvim"
"~/.config/opencode" = "~/.dotfiles/dotfiles/config/opencode"
"~/.config/zsh" = "~/.dotfiles/dotfiles/config/zsh"
"~/.hammerspoon" = "~/.dotfiles/dotfiles/macos/hammerspoon"
"~/.irbrc" = "~/.dotfiles/dotfiles/home/.irbrc"
"~/.local/bin/sesh-list" = "~/.dotfiles/dotfiles/local/bin/sesh-list"
"~/.local/bin/tmux-sesh" = "~/.dotfiles/dotfiles/local/bin/tmux-sesh"
"~/.p10k.mise.zsh" = "~/.dotfiles/dotfiles/home/.p10k.mise.zsh"
"~/.p10k.zsh" = "~/.dotfiles/dotfiles/home/.p10k.zsh"
"~/.pryrc" = "~/.dotfiles/dotfiles/home/.pryrc"
"~/.solargraph.yml" = "~/.dotfiles/dotfiles/home/.solargraph.yml"
"~/.tmux.conf" = "~/.dotfiles/dotfiles/home/.tmux.conf"
"~/.tool-versions" = "~/.dotfiles/dotfiles/home/.tool-versions"
"~/.zsh_plugins.txt" = "~/.dotfiles/dotfiles/home/.zsh_plugins.txt"
"~/.zshrc" = "~/.dotfiles/dotfiles/home/.zshrc"
"~/Library/Application Support/com.mitchellh.ghostty/config" = "~/.dotfiles/dotfiles/config/ghostty/config"

[tasks.setup]
description = "Apply dotfiles"
run = "mise dotfiles apply --force --yes"

[tasks.test]
description = "Validate dotfiles"
run = [
  "mise dotfiles status >/dev/null",
  "mise ls --current >/dev/null",
  "zsh -n ~/.dotfiles/dotfiles/home/.zshrc ~/.dotfiles/dotfiles/config/zsh/*.zsh",
  "python - <<'PY'\nimport tomllib\nfrom pathlib import Path\ntomllib.loads(Path('~/.config/mise/config.toml').expanduser().read_text())\nPY",
  "nvim --headless -c 'lua local ok, err = pcall(function() require(\"user.plugins.sidekick\") end); if not ok then error(err) end' -c 'qa!'",
  "tmux new-session -d -s nvim-mise-test 'cd ~/.dotfiles && nvim test.ts' && sleep 3 && tmux capture-pane -t nvim-mise-test -p >/dev/null && tmux send-keys -t nvim-mise-test ':qa!' Enter && sleep 1 && tmux kill-session -t nvim-mise-test 2>/dev/null || true",
]

[tasks.dev-update]
description = "Update development environment"
run = '''
set -eu

echo "Updating development environment..."

echo "Updating Homebrew..."
brew update -y

echo "Upgrading Homebrew..."
brew upgrade -y

echo "Updating mise-managed tools..."
mise run update

echo "Updating Google Cloud SDK..."
if command -v gcloud >/dev/null 2>&1; then
  gcloud components update --quiet
else
  echo "Skipping Google Cloud SDK update: gcloud not found"
fi
'''

[tasks.update]
description = "Update mise-managed tools"
run = [
  "mise self-update -y",
  "mise install",
  "mise upgrade",
  "mise prune",
  "mise reshim",
]
